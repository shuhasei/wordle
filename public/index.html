<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <title>Word Chain</title>

  <style>
    :root {
      --background: #121213;
      --panel: #1f1f20;
      --border: #3a3a3c;
      --used: #3a3a3c;
      --keyboard: #818384;
      --disabled: #242426;
      --yellow: #b59f3b;
      --green: #538d4e;
      --blue: #4a7db8;
      --orange: #ba7b38;
      --white: #ffffff;
      --muted: #a9a9aa;
      --error: #ff7675;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--white);
      font-family:
        Arial,
        "Helvetica Neue",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color:
        transparent;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      height: 58px;
      display: grid;
      grid-template-columns:
        48px 1fr 48px;
      align-items: center;
      padding: 0 12px;
      border-bottom:
        1px solid var(--border);
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border: 0;
      background: transparent;
      color: var(--white);
      font-size: 26px;
      cursor: pointer;
    }

    .title {
      margin: 0;
      font-size: 27px;
      font-weight: 800;
      letter-spacing: 1px;
      text-align: center;
    }

    .game-area {
      width: min(100%, 540px);
      margin: 0 auto;
      padding: 12px 12px 20px;
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: center;
    }

    .level-badge {
      display: none;
      margin-bottom: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      background: #2f2f31;
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
    }

    .status-panel {
      width: 100%;
      min-height: 110px;
      text-align: center;
    }

    .required-label {
      color: var(--muted);
      font-size: 13px;
    }

    .required-letter {
      margin-top: 2px;
      color: var(--yellow);
      font-size: 38px;
      font-weight: 800;
    }

    .message {
      min-height: 42px;
      margin-top: 5px;
      padding: 0 10px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .message.error {
      color: var(--error);
    }

    .message.success {
      color: #73c276;
    }

    .message.loading {
      color: #d6c66a;
    }

    .board {
      display: grid;
      grid-template-rows:
        repeat(6, 1fr);
      gap: 5px;
      margin: 2px auto 20px;
    }

    .board-row {
      display: grid;
      grid-template-columns:
        repeat(5, 1fr);
      gap: 5px;
    }

    .tile {
      width: 62px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      border:
        2px solid var(--border);
      background: transparent;
      color: var(--white);
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      user-select: none;
    }

    .tile.filled {
      border-color: #565758;
      animation:
        pop 0.08s ease-in-out;
    }

    .tile.used {
      border-color: var(--used);
      background: var(--used);
    }

    .tile.selected-letter {
      border-color: var(--yellow);
      background: var(--yellow);
    }

    .keyboard {
      width: 100%;
      margin-top: auto;
      padding-top: 4px;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .key {
      height: 58px;
      min-width: 43px;
      padding: 0 5px;
      border: 0;
      border-radius: 4px;
      background: var(--keyboard);
      color: var(--white);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .key.large {
      min-width: 66px;
      font-size: 12px;
    }

    .key.used {
      background: var(--used);
    }

    .key.selected {
      background: var(--yellow);
    }

    .key:disabled {
      background: var(--disabled);
      color: #555558;
      opacity: 0.42;
      cursor: not-allowed;
    }

    .restart-button {
      display: none;
      margin: 3px auto 14px;
      padding: 11px 22px;
      border: 0;
      border-radius: 5px;
      background: var(--green);
      color: var(--white);
      font-weight: 800;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        rgba(0, 0, 0, 0.82);
    }

    .overlay.visible {
      display: flex;
    }

    .dialog {
      width: min(440px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      border:
        1px solid #565758;
      border-radius: 12px;
      background: var(--panel);
      box-shadow:
        0 12px 45px
        rgba(0, 0, 0, 0.5);
    }

    .dialog h2 {
      margin:
        0 0 8px;
      text-align: center;
    }

    .dialog-intro {
      margin:
        0 0 18px;
      color: #d7d7d7;
      text-align: center;
      line-height: 1.6;
    }

    .level-list {
      display: grid;
      gap: 12px;
    }

    .level-button {
      width: 100%;
      padding: 16px;
      border:
        2px solid transparent;
      border-radius: 10px;
      color: var(--white);
      text-align: left;
      cursor: pointer;
      transition:
        transform 0.15s ease;
    }

    .level-button:hover {
      transform:
        translateY(-2px);
    }

    .level-button.beginner {
      background: var(--green);
    }

    .level-button.intermediate {
      background: var(--blue);
    }

    .level-button.advanced {
      background: var(--orange);
    }

    .level-name {
      display: block;
      margin-bottom: 4px;
      font-size: 20px;
      font-weight: 800;
    }

    .level-description {
      display: block;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.95;
    }

    .dialog p {
      color: #d7d7d7;
      line-height: 1.7;
    }

    .dialog-close {
      display: block;
      margin: 18px auto 0;
      padding: 9px 18px;
      border: 0;
      border-radius: 5px;
      background: var(--keyboard);
      color: var(--white);
      font-weight: 700;
      cursor: pointer;
    }

    @keyframes pop {
      from {
        transform:
          scale(0.92);
      }

      to {
        transform:
          scale(1);
      }
    }

    @media (max-width: 520px) {
      .top-bar {
        height: 52px;
      }

      .title {
        font-size: 22px;
      }

      .game-area {
        padding:
          7px 7px 12px;
      }

      .tile {
        width:
          min(15.8vw, 58px);
        height:
          min(15.8vw, 58px);
        font-size: 27px;
      }

      .keyboard-row {
        gap: 4px;
        margin-bottom: 6px;
      }

      .key {
        min-width: 0;
        flex: 1;
        height: 54px;
        padding: 0 2px;
        font-size: 13px;
      }

      .key.large {
        flex: 1.45;
        min-width: 0;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="top-bar">
      <button
        id="menuButton"
        class="icon-button"
        type="button"
        aria-label="難易度を選び直す"
      >
        ☰
      </button>

      <h1 class="title">
        WORD CHAIN
      </h1>

      <button
        id="helpButton"
        class="icon-button"
        type="button"
        aria-label="遊び方"
      >
        ?
      </button>
    </header>

    <main class="game-area">
      <div
        id="levelBadge"
        class="level-badge"
      ></div>

      <section class="status-panel">
        <div class="required-label">
          次の単語の頭文字
        </div>

        <div
          id="requiredLetter"
          class="required-letter"
        >
          －
        </div>

        <div
          id="message"
          class="message"
          aria-live="polite"
        ></div>
      </section>

      <div
        id="board"
        class="board"
      ></div>

      <button
        id="restartButton"
        class="restart-button"
        type="button"
      >
        同じ難易度でもう一度
      </button>

      <section
        id="keyboard"
        class="keyboard"
      ></section>
    </main>
  </div>

  <div
    id="levelOverlay"
    class="overlay visible"
  >
    <div class="dialog">
      <h2>難易度を選択</h2>

      <p class="dialog-intro">
        挑戦する英単語のレベルを
        選んでください。
      </p>

      <div class="level-list">
        <button
          class="level-button beginner"
          data-level="beginner"
          type="button"
        >
          <span class="level-name">
            初級
          </span>

          <span class="level-description">
            英検4〜5級レベル相当<br>
            基本的でよく使われる英単語
          </span>
        </button>

        <button
          class="level-button intermediate"
          data-level="intermediate"
          type="button"
        >
          <span class="level-name">
            中級
          </span>

          <span class="level-description">
            英検3級レベル相当<br>
            学校や日常で使う標準的な英単語
          </span>
        </button>

        <button
          class="level-button advanced"
          data-level="advanced"
          type="button"
        >
          <span class="level-name">
            上級
          </span>

          <span class="level-description">
            英検準2級レベル相当<br>
            少し難しい発展的な英単語
          </span>
        </button>
      </div>
    </div>
  </div>

  <div
    id="helpOverlay"
    class="overlay"
  >
    <div class="dialog">
      <h2>遊び方</h2>

      <p>
        最初に難易度を選びます。
        表示された頭文字から始まる
        5文字の英単語を入力してください。
      </p>

      <p>
        2語目以降は、選択した難易度の
        英単語から正解候補が
        内部で2〜3語に絞られます。
      </p>

      <p>
        候補に使われている文字だけが
        キーボードに残りますが、
        正しい文字の順番までは
        案内されません。
      </p>

      <button
        id="closeHelp"
        class="dialog-close"
        type="button"
      >
        閉じる
      </button>
    </div>
  </div>

  <script>
    const API_URL = "/api/words";

    const ROWS = 6;
    const COLUMNS = 5;

    const MIN_HIDDEN_WORDS = 2;
    const MAX_HIDDEN_WORDS = 3;

    const LEVELS = {
      beginner: {
        label:
          "初級｜英検4〜5級相当"
      },

      intermediate: {
        label:
          "中級｜英検3級相当"
      },

      advanced: {
        label:
          "上級｜英検準2級相当"
      }
    };

    const KEYBOARD_ROWS = [
      [
        "Q", "W", "E", "R", "T",
        "Y", "U", "I", "O", "P"
      ],
      [
        "A", "S", "D", "F", "G",
        "H", "J", "K", "L"
      ],
      [
        "ENTER", "Z", "X", "C",
        "V", "B", "N", "M",
        "BACKSPACE"
      ]
    ];

    const COMMON_START_LETTERS = [
      "A", "B", "C", "D", "E",
      "F", "G", "H", "L", "M",
      "P", "R", "S", "T", "W"
    ];

    const boardElement =
      document.getElementById("board");

    const keyboardElement =
      document.getElementById("keyboard");

    const requiredLetterElement =
      document.getElementById(
        "requiredLetter"
      );

    const messageElement =
      document.getElementById("message");

    const restartButton =
      document.getElementById(
        "restartButton"
      );

    const menuButton =
      document.getElementById(
        "menuButton"
      );

    const helpButton =
      document.getElementById(
        "helpButton"
      );

    const helpOverlay =
      document.getElementById(
        "helpOverlay"
      );

    const levelOverlay =
      document.getElementById(
        "levelOverlay"
      );

    const levelBadge =
      document.getElementById(
        "levelBadge"
      );

    const closeHelp =
      document.getElementById(
        "closeHelp"
      );

    let selectedLevel = "";

    let currentRow = 0;
    let currentInput = "";
    let requiredLetter = "";

    let usedWords = [];
    let hiddenCandidates = [];

    let chainStarted = false;
    let gameFinished = false;
    let loading = false;

    const cache = new Map();

    function shuffle(array) {
      const result = [...array];

      for (
        let index =
          result.length - 1;
        index > 0;
        index--
      ) {
        const randomIndex =
          Math.floor(
            Math.random() *
            (index + 1)
          );

        [
          result[index],
          result[randomIndex]
        ] = [
          result[randomIndex],
          result[index]
        ];
      }

      return result;
    }

    function randomInteger(
      min,
      max
    ) {
      return Math.floor(
        Math.random() *
        (max - min + 1)
      ) + min;
    }

    function setMessage(
      text,
      type = ""
    ) {
      messageElement.textContent =
        text;

      messageElement.className =
        "message";

      if (type) {
        messageElement.classList.add(
          type
        );
      }
    }

    function createBoard() {
      boardElement.innerHTML = "";

      for (
        let row = 0;
        row < ROWS;
        row++
      ) {
        const rowElement =
          document.createElement(
            "div"
          );

        rowElement.className =
          "board-row";

        for (
          let column = 0;
          column < COLUMNS;
          column++
        ) {
          const tile =
            document.createElement(
              "div"
            );

          tile.className = "tile";

          tile.dataset.row =
            String(row);

          tile.dataset.column =
            String(column);

          rowElement.appendChild(
            tile
          );
        }

        boardElement.appendChild(
          rowElement
        );
      }
    }

    function createKeyboard() {
      keyboardElement.innerHTML = "";

      KEYBOARD_ROWS.forEach(row => {
        const rowElement =
          document.createElement(
            "div"
          );

        rowElement.className =
          "keyboard-row";

        row.forEach(keyValue => {
          const button =
            document.createElement(
              "button"
            );

          button.type = "button";
          button.className = "key";
          button.dataset.key =
            keyValue;

          if (
            keyValue === "ENTER"
          ) {
            button.textContent =
              "ENTER";

            button.classList.add(
              "large"
            );
          } else if (
            keyValue ===
            "BACKSPACE"
          ) {
            button.textContent = "⌫";

            button.classList.add(
              "large"
            );
          } else {
            button.textContent =
              keyValue;
          }

          button.addEventListener(
            "click",
            () => {
              handleKey(keyValue);
            }
          );

          rowElement.appendChild(
            button
          );
        });

        keyboardElement.appendChild(
          rowElement
        );
      });

      updateKeyboardAvailability();
    }

    function getTile(
      row,
      column
    ) {
      return boardElement.querySelector(
        '.tile[data-row="' +
          row +
          '"][data-column="' +
          column +
          '"]'
      );
    }

    function updateCurrentRow() {
      for (
        let column = 0;
        column < COLUMNS;
        column++
      ) {
        const tile =
          getTile(
            currentRow,
            column
          );

        if (!tile) {
          continue;
        }

        const letter =
          currentInput[column] ||
          "";

        tile.textContent = letter;

        tile.classList.toggle(
          "filled",
          Boolean(letter)
        );
      }

      updateKeyboardAvailability();
    }

    function setLoading(text) {
      loading = true;

      setMessage(
        text,
        "loading"
      );

      updateKeyboardAvailability();
    }

    function finishLoading() {
      loading = false;

      updateKeyboardAvailability();
    }

    async function fetchWords(
      letter
    ) {
      const upperLetter =
        letter.toUpperCase();

      const cacheKey =
        selectedLevel +
        ":" +
        upperLetter;

      if (cache.has(cacheKey)) {
        return cache.get(
          cacheKey
        );
      }

      const response =
        await fetch(
          API_URL +
            "?letter=" +
            encodeURIComponent(
              upperLetter
            ) +
            "&level=" +
            encodeURIComponent(
              selectedLevel
            )
        );

      const data =
        await response
          .json()
          .catch(() => ({}));

      if (!response.ok) {
        throw new Error(
          data.error ||
          "英単語を取得できませんでした。"
        );
      }

      const words =
        Array.isArray(data.words)
          ? data.words
              .map(word =>
                String(word)
                  .toUpperCase()
              )
              .filter(word =>
                /^[A-Z]{5}$/.test(
                  word
                ) &&
                word.startsWith(
                  upperLetter
                )
              )
          : [];

      const uniqueWords =
        [...new Set(words)];

      cache.set(
        cacheKey,
        uniqueWords
      );

      return uniqueWords;
    }

    async function getAvailableWords(
      letter
    ) {
      const words =
        await fetchWords(letter);

      return words.filter(
        word =>
          !usedWords.includes(
            word
          )
      );
    }

    async function findPlayableLetter(
      letters
    ) {
      const uniqueLetters = [
        ...new Set(
          letters.map(letter =>
            letter.toUpperCase()
          )
        )
      ];

      for (
        const letter of shuffle(
          uniqueLetters
        )
      ) {
        const availableWords =
          await getAvailableWords(
            letter
          );

        if (
          availableWords.length >=
          MIN_HIDDEN_WORDS
        ) {
          return letter;
        }
      }

      return null;
    }

    async function prepareHiddenCandidates(
      letter
    ) {
      const availableWords =
        await getAvailableWords(
          letter
        );

      if (
        availableWords.length <
        MIN_HIDDEN_WORDS
      ) {
        hiddenCandidates = [];

        return false;
      }

      const maximumCount =
        Math.min(
          MAX_HIDDEN_WORDS,
          availableWords.length
        );

      const candidateCount =
        randomInteger(
          MIN_HIDDEN_WORDS,
          maximumCount
        );

      hiddenCandidates =
        shuffle(
          availableWords
        ).slice(
          0,
          candidateCount
        );

      return true;
    }

    function getAllowedLettersForRound() {
      if (!chainStarted) {
        return "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
          .split("");
      }

      const allowedLetters =
        new Set();

      hiddenCandidates.forEach(
        word => {
          word
            .split("")
            .forEach(letter => {
              allowedLetters.add(
                letter
              );
            });
        }
      );

      return [
        ...allowedLetters
      ];
    }

    function updateKeyboardAvailability() {
      const allowedLetters =
        getAllowedLettersForRound();

      document
        .querySelectorAll(".key")
        .forEach(button => {
          const key =
            button.dataset.key;

          if (
            key === "BACKSPACE"
          ) {
            button.disabled =
              loading ||
              gameFinished ||
              currentInput.length ===
                0;

            return;
          }

          if (key === "ENTER") {
            button.disabled =
              loading ||
              gameFinished ||
              currentInput.length !==
                COLUMNS;

            return;
          }

          if (
            !/^[A-Z]$/.test(key)
          ) {
            return;
          }

          if (
            loading ||
            gameFinished ||
            currentInput.length >=
              COLUMNS
          ) {
            button.disabled = true;
            return;
          }

          if (
            !chainStarted &&
            currentInput.length === 0
          ) {
            button.disabled =
              key !==
              requiredLetter;

            return;
          }

          if (!chainStarted) {
            button.disabled = false;
            return;
          }

          button.disabled =
            !allowedLetters.includes(
              key
            );
        });
    }

    async function prepareFirstRound() {
      setLoading(
        "英単語を準備しています…"
      );

      const firstLetter =
        await findPlayableLetter(
          COMMON_START_LETTERS
        );

      if (!firstLetter) {
        throw new Error(
          "使用できる英単語が見つかりませんでした。"
        );
      }

      requiredLetter =
        firstLetter;

      requiredLetterElement.textContent =
        requiredLetter;

      finishLoading();

      setMessage(
        "「" +
          requiredLetter +
          "」から始まる5文字英単語を入力してください。",
        "success"
      );
    }

    function addLetter(letter) {
      if (
        loading ||
        gameFinished ||
        currentInput.length >=
          COLUMNS
      ) {
        return;
      }

      const upperLetter =
        letter.toUpperCase();

      if (
        !chainStarted &&
        currentInput.length === 0 &&
        upperLetter !==
          requiredLetter
      ) {
        return;
      }

      if (chainStarted) {
        const allowedLetters =
          getAllowedLettersForRound();

        if (
          !allowedLetters.includes(
            upperLetter
          )
        ) {
          return;
        }
      }

      currentInput +=
        upperLetter;

      updateCurrentRow();
    }

    function removeLetter() {
      if (
        loading ||
        gameFinished ||
        currentInput.length === 0
      ) {
        return;
      }

      currentInput =
        currentInput.slice(
          0,
          -1
        );

      updateCurrentRow();
    }

    function shakeCurrentRow() {
      const row =
        boardElement.children[
          currentRow
        ];

      if (!row) {
        return;
      }

      row.animate(
        [
          {
            transform:
              "translateX(0)"
          },
          {
            transform:
              "translateX(-8px)"
          },
          {
            transform:
              "translateX(8px)"
          },
          {
            transform:
              "translateX(0)"
          }
        ],
        {
          duration: 350
        }
      );
    }

    async function submitWord() {
      if (
        loading ||
        gameFinished
      ) {
        return;
      }

      if (
        currentInput.length !==
        COLUMNS
      ) {
        return;
      }

      if (
        !currentInput.startsWith(
          requiredLetter
        )
      ) {
        setMessage(
          "指定された頭文字から始めてください。",
          "error"
        );

        shakeCurrentRow();
        return;
      }

      if (
        usedWords.includes(
          currentInput
        )
      ) {
        setMessage(
          "その単語はすでに使用しています。",
          "error"
        );

        shakeCurrentRow();
        return;
      }

      if (
        chainStarted &&
        !hiddenCandidates.includes(
          currentInput
        )
      ) {
        setMessage(
          "その英単語は今回の候補ではありません。",
          "error"
        );

        shakeCurrentRow();
        return;
      }

      setLoading(
        "英単語を確認しています…"
      );

      try {
        const validWords =
          await fetchWords(
            requiredLetter
          );

        if (
          !validWords.includes(
            currentInput
          )
        ) {
          finishLoading();

          setMessage(
            "この難易度では使用できない英単語です。",
            "error"
          );

          shakeCurrentRow();

          return;
        }

        const selectedWord =
          currentInput;

        usedWords.push(
          selectedWord
        );

        const possibleLetters = [
          ...new Set(
            selectedWord.split("")
          )
        ];

        let nextLetter =
          await findPlayableLetter(
            possibleLetters
          );

        if (!nextLetter) {
          nextLetter =
            await findPlayableLetter(
              COMMON_START_LETTERS
            );
        }

        if (!nextLetter) {
          finishGame(
            "続けられる英単語が見つかりませんでした。"
          );

          return;
        }

        const prepared =
          await prepareHiddenCandidates(
            nextLetter
          );

        if (!prepared) {
          finishGame(
            "続けられる英単語が見つかりませんでした。"
          );

          return;
        }

        for (
          let column = 0;
          column < COLUMNS;
          column++
        ) {
          const tile =
            getTile(
              currentRow,
              column
            );

          const letter =
            selectedWord[column];

          tile.classList.remove(
            "filled"
          );

          if (
            letter === nextLetter
          ) {
            tile.classList.add(
              "selected-letter"
            );
          } else {
            tile.classList.add(
              "used"
            );
          }
        }

        currentRow += 1;
        currentInput = "";

        if (
          currentRow >= ROWS
        ) {
          finishGame(
            "ゲームクリア！",
            true
          );

          return;
        }

        chainStarted = true;

        requiredLetter =
          nextLetter;

        requiredLetterElement.textContent =
          requiredLetter;

        finishLoading();

        updateCurrentRow();

        setMessage(
          "次は「" +
            requiredLetter +
            "」から始まります。",
          "success"
        );
      } catch (error) {
        console.error(error);

        finishLoading();

        setMessage(
          error.message ||
          "英単語を確認できませんでした。",
          "error"
        );
      }
    }

    function handleKey(key) {
      if (key === "ENTER") {
        submitWord();
        return;
      }

      if (
        key === "BACKSPACE"
      ) {
        removeLetter();
        return;
      }

      if (/^[A-Z]$/.test(key)) {
        addLetter(key);
      }
    }

    function finishGame(
      text,
      success = false
    ) {
      gameFinished = true;
      loading = false;

      requiredLetterElement.textContent =
        success ? "✓" : "－";

      setMessage(
        text,
        success
          ? "success"
          : "error"
      );

      restartButton.style.display =
        "block";

      updateKeyboardAvailability();
    }

    async function startGame() {
      currentRow = 0;
      currentInput = "";
      requiredLetter = "";

      usedWords = [];
      hiddenCandidates = [];

      chainStarted = false;
      gameFinished = false;
      loading = false;

      requiredLetterElement.textContent =
        "－";

      restartButton.style.display =
        "none";

      levelBadge.textContent =
        LEVELS[
          selectedLevel
        ].label;

      levelBadge.style.display =
        "block";

      createBoard();
      createKeyboard();

      try {
        await prepareFirstRound();
      } catch (error) {
        console.error(error);

        finishGame(
          error.message ||
          "ゲームを開始できませんでした。"
        );
      }
    }

    document
      .querySelectorAll(
        ".level-button"
      )
      .forEach(button => {
        button.addEventListener(
          "click",
          () => {
            selectedLevel =
              button.dataset.level;

            levelOverlay.classList.remove(
              "visible"
            );

            startGame();
          }
        );
      });

    restartButton.addEventListener(
      "click",
      startGame
    );

    menuButton.addEventListener(
      "click",
      () => {
        levelOverlay.classList.add(
          "visible"
        );
      }
    );

    helpButton.addEventListener(
      "click",
      () => {
        helpOverlay.classList.add(
          "visible"
        );
      }
    );

    closeHelp.addEventListener(
      "click",
      () => {
        helpOverlay.classList.remove(
          "visible"
        );
      }
    );

    helpOverlay.addEventListener(
      "click",
      event => {
        if (
          event.target ===
          helpOverlay
        ) {
          helpOverlay.classList.remove(
            "visible"
          );
        }
      }
    );

    document.addEventListener(
      "keydown",
      event => {
        if (
          !selectedLevel ||
          levelOverlay.classList.contains(
            "visible"
          ) ||
          helpOverlay.classList.contains(
            "visible"
          )
        ) {
          return;
        }

        const key =
          event.key.toUpperCase();

        if (
          key === "ENTER"
        ) {
          event.preventDefault();
          submitWord();
          return;
        }

        if (
          key === "BACKSPACE"
        ) {
          event.preventDefault();
          removeLetter();
          return;
        }

        if (
          /^[A-Z]$/.test(key)
        ) {
          const button =
            keyboardElement.querySelector(
              '.key[data-key="' +
                key +
                '"]'
            );

          if (
            button &&
            !button.disabled
          ) {
            addLetter(key);
          }
        }
      }
    );

    createBoard();
    createKeyboard();

    setMessage(
      "難易度を選択してください。"
    );
  </script>
</body>
</html>
