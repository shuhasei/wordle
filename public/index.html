<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <title>Word Chain</title>

  <style>
    :root {
      --background: #121213;
      --border: #3a3a3c;
      --used: #3a3a3c;
      --keyboard: #818384;
      --disabled: #242426;
      --yellow: #b59f3b;
      --green: #538d4e;
      --white: #ffffff;
      --muted: #a9a9aa;
      --error: #ff7675;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--white);
      font-family:
        Arial,
        "Helvetica Neue",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      height: 58px;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border: 0;
      background: transparent;
      color: var(--white);
      font-size: 26px;
      cursor: pointer;
    }

    .title {
      margin: 0;
      font-size: 27px;
      font-weight: 800;
      letter-spacing: 1px;
      text-align: center;
    }

    .game-area {
      width: min(100%, 540px);
      margin: 0 auto;
      padding: 12px 12px 20px;
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: center;
    }

    .status-panel {
      width: 100%;
      min-height: 105px;
      text-align: center;
    }

    .required-label {
      color: var(--muted);
      font-size: 13px;
    }

    .required-letter {
      margin-top: 2px;
      color: var(--yellow);
      font-size: 38px;
      font-weight: 800;
    }

    .message {
      min-height: 42px;
      margin-top: 5px;
      padding: 0 10px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .message.error {
      color: var(--error);
    }

    .message.success {
      color: #73c276;
    }

    .message.loading {
      color: #d6c66a;
    }

    .board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
      margin: 2px auto 20px;
    }

    .board-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .tile {
      width: 62px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--white);
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      user-select: none;
    }

    .tile.filled {
      border-color: #565758;
      animation: pop 0.08s ease-in-out;
    }

    .tile.used {
      border-color: var(--used);
      background: var(--used);
    }

    .tile.selected-letter {
      border-color: var(--yellow);
      background: var(--yellow);
    }

    .keyboard {
      width: 100%;
      margin-top: auto;
      padding-top: 4px;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .key {
      height: 58px;
      min-width: 43px;
      padding: 0 5px;
      border: 0;
      border-radius: 4px;
      background: var(--keyboard);
      color: var(--white);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      transition:
        background 0.15s ease,
        color 0.15s ease,
        opacity 0.15s ease;
    }

    .key.large {
      min-width: 66px;
      font-size: 12px;
    }

    .key.used {
      background: var(--used);
    }

    .key.selected {
      background: var(--yellow);
      color: var(--white);
    }

    .key:active:not(:disabled) {
      transform: scale(0.96);
    }

    .key:disabled {
      background: var(--disabled);
      color: #555558;
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
    }

    .restart-button {
      display: none;
      margin: 3px auto 14px;
      padding: 11px 22px;
      border: 0;
      border-radius: 5px;
      background: var(--green);
      color: var(--white);
      font-weight: 800;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.72);
    }

    .overlay.visible {
      display: flex;
    }

    .dialog {
      width: min(420px, 100%);
      padding: 24px;
      border: 1px solid #565758;
      border-radius: 10px;
      background: #1f1f20;
      box-shadow: 0 12px 45px rgba(0, 0, 0, 0.45);
    }

    .dialog h2 {
      margin-top: 0;
    }

    .dialog p {
      color: #d7d7d7;
      line-height: 1.7;
    }

    .dialog-close {
      padding: 9px 18px;
      border: 0;
      border-radius: 5px;
      background: var(--keyboard);
      color: var(--white);
      font-weight: 700;
      cursor: pointer;
    }

    @keyframes pop {
      from {
        transform: scale(0.92);
      }

      to {
        transform: scale(1);
      }
    }

    @media (max-width: 520px) {
      .top-bar {
        height: 52px;
      }

      .title {
        font-size: 22px;
      }

      .game-area {
        padding: 7px 7px 12px;
      }

      .status-panel {
        min-height: 95px;
      }

      .tile {
        width: min(15.8vw, 58px);
        height: min(15.8vw, 58px);
        font-size: 27px;
      }

      .keyboard-row {
        gap: 4px;
        margin-bottom: 6px;
      }

      .key {
        min-width: 0;
        flex: 1;
        height: 54px;
        padding: 0 2px;
        font-size: 13px;
      }

      .key.large {
        min-width: 0;
        flex: 1.45;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="top-bar">
      <button
        id="menuButton"
        class="icon-button"
        type="button"
        aria-label="最初から遊ぶ"
      >
        ☰
      </button>

      <h1 class="title">WORD CHAIN</h1>

      <button
        id="helpButton"
        class="icon-button"
        type="button"
        aria-label="遊び方"
      >
        ?
      </button>
    </header>

    <main class="game-area">
      <section class="status-panel">
        <div class="required-label">
          次の単語の頭文字
        </div>

        <div
          id="requiredLetter"
          class="required-letter"
        >
          －
        </div>

        <div
          id="message"
          class="message"
          aria-live="polite"
        ></div>
      </section>

      <div
        id="board"
        class="board"
        aria-label="ゲームボード"
      ></div>

      <button
        id="restartButton"
        class="restart-button"
        type="button"
      >
        もう一度遊ぶ
      </button>

      <section
        id="keyboard"
        class="keyboard"
        aria-label="キーボード"
      ></section>
    </main>
  </div>

  <div id="helpOverlay" class="overlay">
    <div class="dialog">
      <h2>遊び方</h2>

      <p>
        最初は、表示された頭文字から始まる
        5文字の英単語を自由に入力します。
      </p>

      <p>
        2語目以降は、ウェブ検索した英単語から、
        内部で正解候補が2〜3語に絞られます。
      </p>

      <p>
        候補の単語自体は表示されません。
        候補に使われている英文字だけが押せます。
      </p>

      <p>
        ただし、入力する順番までは案内されません。
        間違った並びも入力できるため、
        単語を自分で考える必要があります。
      </p>

      <p>
        黄色になった文字が次の頭文字です。
        6個つなげるとゲームクリアです。
      </p>

      <button
        id="closeHelp"
        class="dialog-close"
        type="button"
      >
        閉じる
      </button>
    </div>
  </div>

  <script>
    const API_URL = "/api/words";

    const ROWS = 6;
    const COLUMNS = 5;

    const MIN_HIDDEN_WORDS = 2;
    const MAX_HIDDEN_WORDS = 3;

    const KEYBOARD_ROWS = [
      [
        "Q", "W", "E", "R", "T",
        "Y", "U", "I", "O", "P"
      ],
      [
        "A", "S", "D", "F", "G",
        "H", "J", "K", "L"
      ],
      [
        "ENTER", "Z", "X", "C",
        "V", "B", "N", "M", "BACKSPACE"
      ]
    ];

    const COMMON_START_LETTERS = [
      "A", "B", "C", "D", "E",
      "F", "G", "H", "L", "M",
      "P", "R", "S", "T", "W"
    ];

    const boardElement =
      document.getElementById("board");

    const keyboardElement =
      document.getElementById("keyboard");

    const requiredLetterElement =
      document.getElementById("requiredLetter");

    const messageElement =
      document.getElementById("message");

    const restartButton =
      document.getElementById("restartButton");

    const menuButton =
      document.getElementById("menuButton");

    const helpButton =
      document.getElementById("helpButton");

    const helpOverlay =
      document.getElementById("helpOverlay");

    const closeHelp =
      document.getElementById("closeHelp");

    let currentRow = 0;
    let currentInput = "";
    let requiredLetter = "";

    let usedWords = [];
    let hiddenCandidates = [];

    let chainStarted = false;
    let gameFinished = false;
    let loading = false;

    const cache = new Map();

    function shuffle(array) {
      const result = [...array];

      for (
        let index = result.length - 1;
        index > 0;
        index--
      ) {
        const randomIndex =
          Math.floor(
            Math.random() * (index + 1)
          );

        [
          result[index],
          result[randomIndex]
        ] = [
          result[randomIndex],
          result[index]
        ];
      }

      return result;
    }

    function randomInteger(min, max) {
      return Math.floor(
        Math.random() * (max - min + 1)
      ) + min;
    }

    function setMessage(text, type = "") {
      messageElement.textContent = text;
      messageElement.className = "message";

      if (type) {
        messageElement.classList.add(type);
      }
    }

    function createBoard() {
      boardElement.innerHTML = "";

      for (let row = 0; row < ROWS; row++) {
        const rowElement =
          document.createElement("div");

        rowElement.className = "board-row";

        for (
          let column = 0;
          column < COLUMNS;
          column++
        ) {
          const tile =
            document.createElement("div");

          tile.className = "tile";
          tile.dataset.row = String(row);
          tile.dataset.column = String(column);

          rowElement.appendChild(tile);
        }

        boardElement.appendChild(rowElement);
      }
    }

    function createKeyboard() {
      keyboardElement.innerHTML = "";

      KEYBOARD_ROWS.forEach(row => {
        const rowElement =
          document.createElement("div");

        rowElement.className = "keyboard-row";

        row.forEach(keyValue => {
          const button =
            document.createElement("button");

          button.type = "button";
          button.className = "key";
          button.dataset.key = keyValue;

          if (keyValue === "ENTER") {
            button.textContent = "ENTER";
            button.classList.add("large");
          } else if (
            keyValue === "BACKSPACE"
          ) {
            button.textContent = "⌫";
            button.classList.add("large");
          } else {
            button.textContent = keyValue;
          }

          button.addEventListener(
            "click",
            () => {
              handleKey(keyValue);
            }
          );

          rowElement.appendChild(button);
        });

        keyboardElement.appendChild(
          rowElement
        );
      });

      updateKeyboardAvailability();
    }

    function getTile(row, column) {
      return boardElement.querySelector(
        '.tile[data-row="' +
          row +
          '"][data-column="' +
          column +
          '"]'
      );
    }

    function updateCurrentRow() {
      for (
        let column = 0;
        column < COLUMNS;
        column++
      ) {
        const tile =
          getTile(currentRow, column);

        if (!tile) {
          continue;
        }

        const letter =
          currentInput[column] || "";

        tile.textContent = letter;

        tile.classList.toggle(
          "filled",
          Boolean(letter)
        );
      }

      updateKeyboardAvailability();
    }

    function setLoading(text) {
      loading = true;
      setMessage(text, "loading");
      updateKeyboardAvailability();
    }

    function finishLoading() {
      loading = false;
      updateKeyboardAvailability();
    }

    async function fetchWords(letter) {
      const upperLetter =
        letter.toUpperCase();

      if (cache.has(upperLetter)) {
        return cache.get(upperLetter);
      }

      const response = await fetch(
        API_URL +
          "?letter=" +
          encodeURIComponent(
            upperLetter
          )
      );

      const data =
        await response
          .json()
          .catch(() => ({}));

      if (!response.ok) {
        throw new Error(
          data.error ||
          "英単語を取得できませんでした。"
        );
      }

      const words =
        Array.isArray(data.words)
          ? data.words
              .map(word =>
                String(word)
                  .toUpperCase()
              )
              .filter(word =>
                /^[A-Z]{5}$/.test(word) &&
                word.startsWith(
                  upperLetter
                )
              )
          : [];

      const uniqueWords =
        [...new Set(words)];

      cache.set(
        upperLetter,
        uniqueWords
      );

      return uniqueWords;
    }

    async function getAvailableWords(letter) {
      const words =
        await fetchWords(letter);

      return words.filter(word =>
        !usedWords.includes(word)
      );
    }

    async function findPlayableLetter(
      letters
    ) {
      const uniqueLetters = [
        ...new Set(
          letters.map(letter =>
            letter.toUpperCase()
          )
        )
      ];

      for (
        const letter of shuffle(uniqueLetters)
      ) {
        const availableWords =
          await getAvailableWords(letter);

        if (
          availableWords.length >=
          MIN_HIDDEN_WORDS
        ) {
          return letter;
        }
      }

      return null;
    }

    async function prepareHiddenCandidates(
      letter
    ) {
      const availableWords =
        await getAvailableWords(letter);

      if (
        availableWords.length <
        MIN_HIDDEN_WORDS
      ) {
        hiddenCandidates = [];
        return false;
      }

      const maximumCount =
        Math.min(
          MAX_HIDDEN_WORDS,
          availableWords.length
        );

      const candidateCount =
        randomInteger(
          MIN_HIDDEN_WORDS,
          maximumCount
        );

      hiddenCandidates =
        shuffle(availableWords).slice(
          0,
          candidateCount
        );

      return (
        hiddenCandidates.length >=
        MIN_HIDDEN_WORDS
      );
    }

    /*
      候補2〜3語で使われている
      すべての文字を取得する。

      入力位置や並び順では絞り込まない。
    */
    function getAllowedLettersForRound() {
      if (!chainStarted) {
        return "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
          .split("");
      }

      const allowedLetters =
        new Set();

      hiddenCandidates.forEach(word => {
        word.split("").forEach(letter => {
          allowedLetters.add(letter);
        });
      });

      return [...allowedLetters];
    }

    function updateKeyboardAvailability() {
      const allowedLetters =
        getAllowedLettersForRound();

      document
        .querySelectorAll(".key")
        .forEach(button => {
          const key =
            button.dataset.key;

          if (key === "BACKSPACE") {
            button.disabled =
              loading ||
              gameFinished ||
              currentInput.length === 0;

            return;
          }

          if (key === "ENTER") {
            button.disabled =
              loading ||
              gameFinished ||
              currentInput.length !== COLUMNS;

            return;
          }

          if (!/^[A-Z]$/.test(key)) {
            return;
          }

          if (
            loading ||
            gameFinished ||
            currentInput.length >= COLUMNS
          ) {
            button.disabled = true;
            return;
          }

          /*
            1語目の最初の文字だけ
            指定された頭文字に制限する。
          */
          if (
            !chainStarted &&
            currentInput.length === 0
          ) {
            button.disabled =
              key !== requiredLetter;

            return;
          }

          /*
            1語目の2文字目以降は自由。
          */
          if (!chainStarted) {
            button.disabled = false;
            return;
          }

          /*
            2語目以降は、
            候補2〜3語に含まれる文字だけ押せる。

            文字の位置や順番による
            絞り込みは行わない。
          */
          button.disabled =
            !allowedLetters.includes(key);
        });
    }

    async function prepareFirstRound() {
      setLoading(
        "英単語を準備しています…"
      );

      const firstLetter =
        await findPlayableLetter(
          COMMON_START_LETTERS
        );

      if (!firstLetter) {
        throw new Error(
          "使用できる英単語が見つかりませんでした。"
        );
      }

      requiredLetter = firstLetter;

      requiredLetterElement.textContent =
        requiredLetter;

      finishLoading();

      setMessage(
        "最初は「" +
          requiredLetter +
          "」から始まる5文字英単語を入力してください。",
        "success"
      );
    }

    function addLetter(letter) {
      if (
        loading ||
        gameFinished ||
        currentInput.length >= COLUMNS
      ) {
        return;
      }

      const upperLetter =
        letter.toUpperCase();

      if (
        !chainStarted &&
        currentInput.length === 0 &&
        upperLetter !== requiredLetter
      ) {
        setMessage(
          "最初の文字は「" +
            requiredLetter +
            "」です。",
          "error"
        );

        shakeCurrentRow();
        return;
      }

      /*
        2語目以降は、
        候補2〜3語に含まれる文字かだけを確認する。

        入力位置や正しい順番までは確認しない。
      */
      if (chainStarted) {
        const allowedLetters =
          getAllowedLettersForRound();

        if (
          !allowedLetters.includes(
            upperLetter
          )
        ) {
          return;
        }
      }

      currentInput += upperLetter;
      updateCurrentRow();
    }

    function removeLetter() {
      if (
        loading ||
        gameFinished ||
        currentInput.length === 0
      ) {
        return;
      }

      currentInput =
        currentInput.slice(0, -1);

      updateCurrentRow();
    }

    function markKeyboardLetter(
      letter,
      className
    ) {
      const key =
        keyboardElement.querySelector(
          '.key[data-key="' +
            letter +
            '"]'
        );

      if (!key) {
        return;
      }

      if (className === "selected") {
        key.classList.remove("used");
        key.classList.add("selected");
      } else if (
        !key.classList.contains(
          "selected"
        )
      ) {
        key.classList.add(className);
      }
    }

    function shakeCurrentRow() {
      const row =
        boardElement.children[
          currentRow
        ];

      if (!row) {
        return;
      }

      row.animate(
        [
          {
            transform:
              "translateX(0)"
          },
          {
            transform:
              "translateX(-8px)"
          },
          {
            transform:
              "translateX(8px)"
          },
          {
            transform:
              "translateX(-5px)"
          },
          {
            transform:
              "translateX(5px)"
          },
          {
            transform:
              "translateX(0)"
          }
        ],
        {
          duration: 350
        }
      );
    }

    async function submitWord() {
      if (
        loading ||
        gameFinished
      ) {
        return;
      }

      if (
        currentInput.length !==
        COLUMNS
      ) {
        setMessage(
          "5文字の英単語を入力してください。",
          "error"
        );

        shakeCurrentRow();
        return;
      }

      if (
        !currentInput.startsWith(
          requiredLetter
        )
      ) {
        setMessage(
          "「" +
            requiredLetter +
            "」から始まる単語を入力してください。",
          "error"
        );

        shakeCurrentRow();
        return;
      }

      if (
        usedWords.includes(
          currentInput
        )
      ) {
        setMessage(
          "その単語はすでに使用しています。",
          "error"
        );

        shakeCurrentRow();
        return;
      }

      /*
        2語目以降は、
        内部候補2〜3語のどれかと
        完全一致した場合だけ正解。
      */
      if (
        chainStarted &&
        !hiddenCandidates.includes(
          currentInput
        )
      ) {
        setMessage(
          "その英単語は今回の候補ではありません。",
          "error"
        );

        shakeCurrentRow();
        return;
      }

      setLoading(
        "英単語を確認しています…"
      );

      try {
        const validWords =
          await fetchWords(
            requiredLetter
          );

        if (
          !validWords.includes(
            currentInput
          )
        ) {
          finishLoading();

          setMessage(
            "有効な5文字英単語ではありません。",
            "error"
          );

          shakeCurrentRow();
          return;
        }

        const selectedWord =
          currentInput;

        usedWords.push(
          selectedWord
        );

        const possibleLetters = [
          ...new Set(
            selectedWord.split("")
          )
        ];

        let nextLetter =
          await findPlayableLetter(
            possibleLetters
          );

        if (!nextLetter) {
          nextLetter =
            await findPlayableLetter(
              COMMON_START_LETTERS
            );
        }

        if (!nextLetter) {
          finishGame(
            "続けられる英単語が見つかりませんでした。"
          );

          return;
        }

        const candidatesPrepared =
          await prepareHiddenCandidates(
            nextLetter
          );

        if (!candidatesPrepared) {
          finishGame(
            "続けられる英単語が見つかりませんでした。"
          );

          return;
        }

        for (
          let column = 0;
          column < COLUMNS;
          column++
        ) {
          const tile =
            getTile(
              currentRow,
              column
            );

          const letter =
            selectedWord[column];

          tile.classList.remove(
            "filled"
          );

          if (
            letter === nextLetter
          ) {
            tile.classList.add(
              "selected-letter"
            );

            markKeyboardLetter(
              letter,
              "selected"
            );
          } else {
            tile.classList.add(
              "used"
            );

            markKeyboardLetter(
              letter,
              "used"
            );
          }
        }

        currentRow += 1;
        currentInput = "";

        if (
          currentRow >= ROWS
        ) {
          finishGame(
            "ゲームクリア！6個の英単語をつなげました。",
            true
          );

          return;
        }

        chainStarted = true;
        requiredLetter = nextLetter;

        requiredLetterElement.textContent =
          requiredLetter;

        finishLoading();
        updateCurrentRow();

        setMessage(
          "次は「" +
            requiredLetter +
            "」から始まります。使える文字から英単語を考えてください。",
          "success"
        );
      } catch (error) {
        console.error(error);

        finishLoading();

        setMessage(
          error.message ||
          "英単語を確認できませんでした。",
          "error"
        );
      }
    }

    function handleKey(key) {
      if (key === "ENTER") {
        submitWord();
        return;
      }

      if (
        key === "BACKSPACE"
      ) {
        removeLetter();
        return;
      }

      if (/^[A-Z]$/.test(key)) {
        addLetter(key);
      }
    }

    function finishGame(
      text,
      success = false
    ) {
      gameFinished = true;
      loading = false;

      requiredLetterElement.textContent =
        success ? "✓" : "－";

      setMessage(
        text,
        success
          ? "success"
          : "error"
      );

      restartButton.style.display =
        "block";

      updateKeyboardAvailability();
    }

    async function startGame() {
      currentRow = 0;
      currentInput = "";
      requiredLetter = "";

      usedWords = [];
      hiddenCandidates = [];

      chainStarted = false;
      gameFinished = false;
      loading = false;

      requiredLetterElement.textContent =
        "－";

      restartButton.style.display =
        "none";

      createBoard();
      createKeyboard();

      try {
        await prepareFirstRound();
      } catch (error) {
        console.error(error);

        finishGame(
          error.message ||
          "ゲームを開始できませんでした。"
        );
      }
    }

    document.addEventListener(
      "keydown",
      event => {
        if (
          event.ctrlKey ||
          event.altKey ||
          event.metaKey
        ) {
          return;
        }

        const key =
          event.key.toUpperCase();

        if (key === "ENTER") {
          event.preventDefault();

          const enterButton =
            keyboardElement.querySelector(
              '.key[data-key="ENTER"]'
            );

          if (
            enterButton &&
            !enterButton.disabled
          ) {
            handleKey("ENTER");
          }

          return;
        }

        if (
          key === "BACKSPACE"
        ) {
          event.preventDefault();

          const backspaceButton =
            keyboardElement.querySelector(
              '.key[data-key="BACKSPACE"]'
            );

          if (
            backspaceButton &&
            !backspaceButton.disabled
          ) {
            handleKey("BACKSPACE");
          }

          return;
        }

        if (/^[A-Z]$/.test(key)) {
          const letterButton =
            keyboardElement.querySelector(
              '.key[data-key="' +
                key +
                '"]'
            );

          if (
            letterButton &&
            !letterButton.disabled
          ) {
            handleKey(key);
          }
        }
      }
    );

    restartButton.addEventListener(
      "click",
      startGame
    );

    menuButton.addEventListener(
      "click",
      () => {
        const shouldRestart =
          window.confirm(
            "最初からゲームをやり直しますか？"
          );

        if (shouldRestart) {
          startGame();
        }
      }
    );

    helpButton.addEventListener(
      "click",
      () => {
        helpOverlay.classList.add(
          "visible"
        );
      }
    );

    closeHelp.addEventListener(
      "click",
      () => {
        helpOverlay.classList.remove(
          "visible"
        );
      }
    );

    helpOverlay.addEventListener(
      "click",
      event => {
        if (
          event.target ===
          helpOverlay
        ) {
          helpOverlay.classList.remove(
            "visible"
          );
        }
      }
    );

    startGame();
  </script>
</body>
</html>
